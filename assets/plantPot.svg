<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 720">
  <g fill="none" stroke="none" stroke-width="0.5" stroke-miterlimit="10">
   
    <!-- Bottom curved base -->
    <ellipse cx="240" cy="620" rx="70" ry="12" fill="#C67B5C" stroke="#000000" stroke-width="3"/>

    <!-- Main body: polyline (no bottom stroke, like barrel) -->
    <polyline points="170,620 130,430 350,430 310,620" fill="#C67B5C" stroke="#000000" stroke-width="3"/>

    <!-- Rim bottom curve (elliptical) -->
    <ellipse cx="240" cy="430" rx="150" ry="22" fill="#C67B5C" stroke="#000000" stroke-width="3"/>

    <!-- Rim sides: straight down from rim top to rim bottom -->
    <polyline points="90,430 90,380 390,380 390,430" fill="#C67B5C" stroke="#000000" stroke-width="3"/>

    <!-- Rim top surface (overhanging lip, darker color) -->
    <ellipse cx="240" cy="380" rx="150" ry="22" fill="#8B4513" stroke="#000000" stroke-width="3"/>

    <!-- Soil opening -->
    <ellipse cx="240" cy="380" rx="100" ry="14" fill="#3D2817" stroke="#000000" stroke-width="2"/>
     <!-- Stem: behind pot body, emerges from soil -->
    <rect x="226" y="80" width="28" height="300" fill="#0d2d06" stroke="#000000" stroke-width="2"/>

  </g>
</svg>
